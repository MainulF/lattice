# Gradle daemon — large heap for Vineflower decompilation (MC 26.1 is ~50k classes)
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true

# Tell Gradle where JDKs are installed (Arch Linux path)
org.gradle.java.installations.paths=/usr/lib/jvm/java-26-openjdk
